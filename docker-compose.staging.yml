# docker-compose.staging.yml
# Staging deployment — standalone compose file, environment variables injected from shell
# Variables are exported by the deploy workflow (GitHub Actions) before `docker compose up`
# Working directory: /opt/myfinpro/staging/
# Usage: docker compose -f docker-compose.staging.yml up -d

services:
  # ───── MySQL Database ─────
  mysql:
    image: mysql:8.4
    container_name: myfinpro-staging-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - myfinpro-staging-mysql:/var/lib/mysql
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - myfinpro-staging
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  # ───── Redis ─────
  redis:
    image: redis:8-alpine
    container_name: myfinpro-staging-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - myfinpro-staging-redis:/data
    networks:
      - myfinpro-staging
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ───── Haraka SMTP Server ─────
  haraka:
    build:
      context: ./infrastructure/haraka
      dockerfile: Dockerfile
    container_name: myfinpro-staging-haraka
    restart: unless-stopped
    environment:
      # Derived from SERVER_NAME; HARAKA_MAIL_HOSTNAME derived by entrypoint.sh as mail.${HARAKA_MAIL_DOMAIN}
      HARAKA_MAIL_DOMAIN: ${SERVER_NAME}
    volumes:
      - ./infrastructure/haraka/dkim-keys:/opt/haraka/dkim-keys:ro
      - myfinpro-staging-haraka-queue:/opt/haraka/queue
    networks:
      - myfinpro-staging
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const s=require('net').connect(25,'localhost',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ───── NestJS API ─────
  api:
    image: ghcr.io/${GHCR_REPO}/api:${IMAGE_TAG:-staging}
    container_name: myfinpro-staging-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: ${NODE_ENV}
      API_PORT: ${API_PORT}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      # SMTP — static (internal Haraka relay) + derived from SERVER_NAME
      SMTP_HOST: haraka
      SMTP_PORT: '25'
      SMTP_SECURE: 'false'
      SMTP_FROM: 'MyFinPro <noreply@${SERVER_NAME}>'
    ports:
      - '3001:3001'
    networks:
      - myfinpro-staging
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      haraka:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3001/api/v1/health',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ───── Next.js Web ─────
  web:
    image: ghcr.io/${GHCR_REPO}/web:${IMAGE_TAG:-staging}
    container_name: myfinpro-staging-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      NODE_ENV: ${NODE_ENV}
    ports:
      - '3000:3000'
    networks:
      - myfinpro-staging
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ───── Nginx Reverse Proxy ─────
  nginx:
    image: nginx:1.28-alpine
    container_name: myfinpro-staging-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      - SERVER_NAME=${SERVER_NAME}
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/ssl:/etc/letsencrypt:ro
    networks:
      - myfinpro-staging
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost/health']
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  myfinpro-staging-mysql:
    driver: local
  myfinpro-staging-redis:
    driver: local
  myfinpro-staging-haraka-queue:
    driver: local

networks:
  myfinpro-staging:
    driver: bridge

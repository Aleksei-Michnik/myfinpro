# docker-compose.production.infra.yml
# Long-lived infrastructure services for production.
# Managed separately from application deploys (blue-green slots).
# Nginx is in docker-compose.shared-nginx.yml (shared across environments).
# Network: myfinpro-production-net (created externally before first deploy)
# Usage: docker compose -p myfinpro-production-infra -f docker-compose.production.infra.yml up -d

services:
  # ───── MySQL Database ─────
  mysql:
    image: mysql:8.4
    container_name: myfinpro-prod-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # No exposed ports in production — internal only
    volumes:
      - myfinpro-production-mysql:/var/lib/mysql
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - myfinpro-production-net
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --max-connections=200
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  # ───── Redis ─────
  redis:
    image: redis:8-alpine
    container_name: myfinpro-prod-redis
    restart: unless-stopped
    # No exposed ports in production — internal only
    volumes:
      - myfinpro-production-redis:/data
    networks:
      - myfinpro-production-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  # ───── Haraka SMTP Server ─────
  haraka:
    build:
      context: ./infrastructure/haraka
      dockerfile: Dockerfile
    container_name: myfinpro-prod-haraka
    restart: unless-stopped
    environment:
      # Derived from SERVER_NAME; HARAKA_MAIL_HOSTNAME derived by entrypoint.sh as mail.${HARAKA_MAIL_DOMAIN}
      HARAKA_MAIL_DOMAIN: ${SERVER_NAME}
    volumes:
      - ./infrastructure/haraka/dkim-keys:/opt/haraka/dkim-keys:ro
      - myfinpro-production-haraka-queue:/opt/haraka/queue
    networks:
      myfinpro-production-net:
        aliases:
          - haraka
    healthcheck:
      test: ['CMD', 'nc', '-z', 'localhost', '25']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

volumes:
  myfinpro-production-mysql:
    name: myfinpro-production-mysql
    driver: local
  myfinpro-production-redis:
    name: myfinpro-production-redis
    driver: local
  myfinpro-production-haraka-queue:
    name: myfinpro-production-haraka-queue
    driver: local

networks:
  myfinpro-production-net:
    external: true

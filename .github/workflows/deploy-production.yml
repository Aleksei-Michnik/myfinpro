# .github/workflows/deploy-production.yml
# Production Deployment — Blue-green strategy with zero-downtime
# Triggered on push to main or manual dispatch with approval
# Security: GitHub Secrets → SSH → export env vars → deploy.sh (blue-green)

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-production" to confirm'
        required: true
        type: string
      version_tag:
        description: 'Version tag (e.g., v1.2.3). Leave empty for auto-generated.'
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ───── Validate manual dispatch confirmation ─────
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate manual trigger confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-production" ]; then
            echo "❌ Confirmation text does not match. Expected 'deploy-production'."
            exit 1
          fi
          echo "✅ Manual deployment confirmed."

  # ───── Wait for CI to pass ─────
  ci-check:
    name: Wait for CI
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    steps:
      - name: Wait for CI workflow to complete
        uses: actions/github-script@v8
        with:
          script: |
            const maxAttempts = 60;  // 15 minutes max (60 × 15s)
            const interval = 15000; // 15 seconds

            for (let i = 0; i < maxAttempts; i++) {
              const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                head_sha: context.sha,
              });

              if (runs.length > 0) {
                const run = runs[0];
                if (run.status === 'completed') {
                  if (run.conclusion === 'success') {
                    console.log(`✅ CI workflow #${run.run_number} completed successfully`);
                    return;
                  } else {
                    core.setFailed(`❌ CI workflow #${run.run_number} failed with conclusion: ${run.conclusion}`);
                    return;
                  }
                }
                console.log(`⏳ CI workflow #${run.run_number} status: ${run.status}. Waiting... (${i + 1}/${maxAttempts})`);
              } else {
                console.log(`⏳ CI workflow not found yet for SHA ${context.sha}. Waiting... (${i + 1}/${maxAttempts})`);
              }

              await new Promise(r => setTimeout(r, interval));
            }

            core.setFailed('⏰ Timeout waiting for CI workflow to complete');

  # ───── Verify Staging Tests Passed ─────
  staging-tests-check:
    name: Verify Staging Tests
    runs-on: ubuntu-latest
    needs: ci-check
    timeout-minutes: 5
    steps:
      - name: Verify staging tests passed
        uses: actions/github-script@v8
        with:
          script: |
            // Find the latest successful run of test-staging.yml
            const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'test-staging.yml',
              status: 'completed',
              per_page: 5,
            });

            if (runs.length === 0) {
              core.setFailed('❌ No staging test runs found. Deploy to staging and run tests first.');
              return;
            }

            const latestRun = runs[0];

            if (latestRun.conclusion !== 'success') {
              core.setFailed(`❌ Latest staging tests failed (run #${latestRun.run_number}, conclusion: ${latestRun.conclusion}). Fix staging tests before deploying to production.`);
              return;
            }

            // Check that the staging tests are not too old (max 24 hours)
            const runDate = new Date(latestRun.updated_at);
            const now = new Date();
            const hoursSinceRun = (now - runDate) / (1000 * 60 * 60);

            if (hoursSinceRun > 24) {
              core.setFailed(`❌ Latest staging tests are ${Math.round(hoursSinceRun)} hours old (run #${latestRun.run_number}). Deploy to staging and run fresh tests first.`);
              return;
            }

            console.log(`✅ Staging tests passed (run #${latestRun.run_number}, ${Math.round(hoursSinceRun)} hours ago)`);
            console.log(`   URL: ${latestRun.html_url}`);

  # ───── Build & Push Docker Images ─────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [ci-check, staging-tests-check]
    timeout-minutes: 20
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      version_tag: ${{ steps.meta.outputs.version_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          VERSION_TAG="${{ github.event.inputs.version_tag }}"
          if [ -z "$VERSION_TAG" ]; then
            VERSION_TAG="v$(date +%Y%m%d)-${SHA_SHORT}"
          fi
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "repo_lower=${REPO_LOWER}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infrastructure/docker/api.Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/api:latest
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/api:${{ steps.meta.outputs.version_tag }}
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/api:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=api-production
          cache-to: type=gha,mode=max,scope=api-production

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infrastructure/docker/web.Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/web:latest
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/web:${{ steps.meta.outputs.version_tag }}
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/web:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=web-production
          cache-to: type=gha,mode=max,scope=web-production

  # ───── Deploy to Production Server ─────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 15
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Copy deployment files to production server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          source: >-
            docker-compose.production.infra.yml,
            docker-compose.production.app.yml,
            docker-compose.shared-nginx.yml,
            infrastructure/nginx/,
            infrastructure/mysql/,
            scripts/deploy.sh,
            scripts/rollback.sh,
            scripts/cleanup-images.sh
          target: /opt/myfinpro/production
          overwrite: true

      - name: Deploy with blue-green strategy
        uses: appleboy/ssh-action@v1.2.2
        env:
          # ── Database secrets (mapped from PRODUCTION_* GitHub secrets) ──
          MYSQL_ROOT_PASSWORD: ${{ secrets.PRODUCTION_MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.PRODUCTION_MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.PRODUCTION_MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.PRODUCTION_MYSQL_PASSWORD }}
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          # ── Auth secrets ──
          JWT_SECRET: ${{ secrets.PRODUCTION_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.PRODUCTION_JWT_REFRESH_SECRET }}
          # ── Redis ──
          REDIS_URL: ${{ secrets.PRODUCTION_REDIS_URL }}
          # ── Google OAuth ──
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: https://${{ secrets.CLOUDFLARE_PRODUCTION_SUBDOMAIN }}/api/v1/auth/google/callback
          FRONTEND_URL: https://${{ secrets.CLOUDFLARE_PRODUCTION_SUBDOMAIN }}
          # ── Non-secret config ──
          NODE_ENV: production
          API_PORT: '3001'
          CORS_ORIGINS: 'https://${{ secrets.CLOUDFLARE_PRODUCTION_SUBDOMAIN }}'
          LOG_LEVEL: warn
          SWAGGER_ENABLED: 'false'
          RATE_LIMIT_TTL: '60000'
          RATE_LIMIT_MAX: '30'
          NEXT_PUBLIC_API_URL: /api
          API_INTERNAL_URL: http://api:3001
          # ── Image config ──
          GHCR_REPO: aleksei-michnik/myfinpro
          IMAGE_TAG: ${{ needs.build-and-push.outputs.sha_short }}
          # ── Server config ──
          SERVER_NAME: ${{ secrets.CLOUDFLARE_PRODUCTION_SUBDOMAIN }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          envs: MYSQL_ROOT_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,DATABASE_URL,JWT_SECRET,JWT_REFRESH_SECRET,REDIS_URL,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_CALLBACK_URL,FRONTEND_URL,NODE_ENV,API_PORT,CORS_ORIGINS,LOG_LEVEL,SWAGGER_ENABLED,RATE_LIMIT_TTL,RATE_LIMIT_MAX,NEXT_PUBLIC_API_URL,API_INTERNAL_URL,GHCR_REPO,IMAGE_TAG,SERVER_NAME
          script: |
            set -euo pipefail
            cd /opt/myfinpro/production

            echo "── Exporting environment variables ──"
            export MYSQL_ROOT_PASSWORD
            export MYSQL_DATABASE
            export MYSQL_USER
            export MYSQL_PASSWORD
            export DATABASE_URL
            export JWT_SECRET
            export JWT_REFRESH_SECRET
            export REDIS_URL
            export GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_CALLBACK_URL FRONTEND_URL
            export NODE_ENV
            export API_PORT
            export CORS_ORIGINS
            export LOG_LEVEL
            export SWAGGER_ENABLED
            export RATE_LIMIT_TTL
            export RATE_LIMIT_MAX
            export NEXT_PUBLIC_API_URL
            export API_INTERNAL_URL
            export GHCR_REPO
            export IMAGE_TAG
            export SERVER_NAME

            echo "── Ensuring Docker networks exist ──"
            docker network create myfinpro-staging-net 2>/dev/null || true
            docker network create myfinpro-production-net 2>/dev/null || true

            echo "── Setting up shared nginx directory ──"
            mkdir -p /opt/myfinpro/shared/nginx/conf.d
            mkdir -p /opt/myfinpro/shared/ssl
            cp infrastructure/nginx/nginx.conf /opt/myfinpro/shared/nginx/nginx.conf
            cp infrastructure/nginx/conf.d/cloudflare-ips.conf /opt/myfinpro/shared/nginx/conf.d/cloudflare-ips.conf
            cp infrastructure/nginx/conf.d/_default.conf /opt/myfinpro/shared/nginx/conf.d/_default.conf
            # Remove old default.conf from shared dir (we use per-env configs now)
            rm -f /opt/myfinpro/shared/nginx/conf.d/default.conf
            cp docker-compose.shared-nginx.yml /opt/myfinpro/shared/docker-compose.shared-nginx.yml

            echo "── Ensuring shared nginx is running ──"
            cd /opt/myfinpro/shared
            # Stop any old per-environment nginx that might hold port 80
            docker stop myfinpro-prod-nginx myfinpro-staging-nginx 2>/dev/null || true
            docker rm myfinpro-prod-nginx myfinpro-staging-nginx 2>/dev/null || true
            # Start shared nginx if not running (don't force-recreate — that
            # breaks DNS resolution for existing app containers). Config
            # changes are picked up via nginx -s reload in deploy.sh.
            docker compose -p myfinpro-shared -f docker-compose.shared-nginx.yml up -d
            cd /opt/myfinpro/production

            echo "── Ensuring infrastructure is running ──"
            docker compose -p myfinpro-production-infra -f docker-compose.production.infra.yml up -d

            echo "── Deploying application with blue-green strategy ──"
            chmod +x scripts/deploy.sh scripts/rollback.sh scripts/cleanup-images.sh
            bash scripts/deploy.sh production "$IMAGE_TAG"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.2
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.PRODUCTION_MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.PRODUCTION_MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.PRODUCTION_MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.PRODUCTION_MYSQL_PASSWORD }}
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.PRODUCTION_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.PRODUCTION_JWT_REFRESH_SECRET }}
          REDIS_URL: ${{ secrets.PRODUCTION_REDIS_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: https://${{ secrets.CLOUDFLARE_PRODUCTION_SUBDOMAIN }}/api/v1/auth/google/callback
          FRONTEND_URL: https://${{ secrets.CLOUDFLARE_PRODUCTION_SUBDOMAIN }}
          NODE_ENV: production
          API_PORT: '3001'
          CORS_ORIGINS: 'https://${{ secrets.CLOUDFLARE_PRODUCTION_SUBDOMAIN }}'
          LOG_LEVEL: warn
          SWAGGER_ENABLED: 'false'
          RATE_LIMIT_TTL: '60000'
          RATE_LIMIT_MAX: '30'
          NEXT_PUBLIC_API_URL: /api
          API_INTERNAL_URL: http://api:3001
          GHCR_REPO: aleksei-michnik/myfinpro
          IMAGE_TAG: ${{ needs.build-and-push.outputs.sha_short }}
          SERVER_NAME: ${{ secrets.CLOUDFLARE_PRODUCTION_SUBDOMAIN }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          envs: MYSQL_ROOT_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,DATABASE_URL,JWT_SECRET,JWT_REFRESH_SECRET,REDIS_URL,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_CALLBACK_URL,FRONTEND_URL,NODE_ENV,API_PORT,CORS_ORIGINS,LOG_LEVEL,SWAGGER_ENABLED,RATE_LIMIT_TTL,RATE_LIMIT_MAX,NEXT_PUBLIC_API_URL,API_INTERNAL_URL,GHCR_REPO,IMAGE_TAG,SERVER_NAME
          script: |
            echo "⚠️ Production deployment failed — initiating rollback..."
            cd /opt/myfinpro/production

            export MYSQL_ROOT_PASSWORD MYSQL_DATABASE MYSQL_USER MYSQL_PASSWORD
            export DATABASE_URL JWT_SECRET JWT_REFRESH_SECRET REDIS_URL
            export GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_CALLBACK_URL FRONTEND_URL
            export NODE_ENV API_PORT CORS_ORIGINS LOG_LEVEL SWAGGER_ENABLED
            export RATE_LIMIT_TTL RATE_LIMIT_MAX NEXT_PUBLIC_API_URL API_INTERNAL_URL
            export GHCR_REPO IMAGE_TAG SERVER_NAME

            if [ -f scripts/rollback.sh ]; then
              chmod +x scripts/rollback.sh
              bash scripts/rollback.sh production
            fi

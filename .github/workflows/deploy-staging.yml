# .github/workflows/deploy-staging.yml
# Staging Deployment — Blue-green strategy with zero-downtime
# Triggered on push to develop or manual dispatch
# Security: GitHub Secrets → SSH → export env vars → deploy.sh (blue-green)

name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ───── Wait for CI to pass ─────
  ci-check:
    name: Wait for CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Wait for CI workflow to complete
        uses: actions/github-script@v8
        with:
          script: |
            const maxAttempts = 60;  // 15 minutes max (60 × 15s)
            const interval = 15000; // 15 seconds

            for (let i = 0; i < maxAttempts; i++) {
              const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                head_sha: context.sha,
              });

              if (runs.length > 0) {
                const run = runs[0];
                if (run.status === 'completed') {
                  if (run.conclusion === 'success') {
                    console.log(`✅ CI workflow #${run.run_number} completed successfully`);
                    return;
                  } else {
                    core.setFailed(`❌ CI workflow #${run.run_number} failed with conclusion: ${run.conclusion}`);
                    return;
                  }
                }
                console.log(`⏳ CI workflow #${run.run_number} status: ${run.status}. Waiting... (${i + 1}/${maxAttempts})`);
              } else {
                console.log(`⏳ CI workflow not found yet for SHA ${context.sha}. Waiting... (${i + 1}/${maxAttempts})`);
              }

              await new Promise(r => setTimeout(r, interval));
            }

            core.setFailed('⏰ Timeout waiting for CI workflow to complete');

  # ───── Build & Push Docker Images ─────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: ci-check
    timeout-minutes: 20
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infrastructure/docker/api.Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/api:staging
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/api:staging-${{ steps.meta.outputs.sha_short }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          no-cache: true

      - name: Derive Telegram bot ID from token
        id: telegram
        run: |
          BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN_STAGE }}"
          echo "bot_id=${BOT_TOKEN%%:*}" >> "$GITHUB_OUTPUT"

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infrastructure/docker/web.Dockerfile
          target: production
          push: true
          build-args: |
            NEXT_PUBLIC_TELEGRAM_BOT_ID=${{ steps.telegram.outputs.bot_id }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/web:staging
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/web:staging-${{ steps.meta.outputs.sha_short }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=web-staging
          cache-to: type=gha,mode=max,scope=web-staging

  # ───── Deploy to Staging Server ─────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 40
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Copy deployment files to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: >-
            docker-compose.staging.infra.yml,
            docker-compose.staging.app.yml,
            docker-compose.shared-nginx.yml,
            infrastructure/nginx/,
            infrastructure/mysql/,
            infrastructure/haraka/,
            scripts/deploy.sh,
            scripts/rollback.sh,
            scripts/cleanup-images.sh
          target: /opt/myfinpro/staging
          overwrite: true

      - name: Deploy with blue-green strategy
        uses: appleboy/ssh-action@v1.2.2
        env:
          # ── Database secrets (mapped from STAGING_* GitHub secrets) ──
          MYSQL_ROOT_PASSWORD: ${{ secrets.STAGING_MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.STAGING_MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.STAGING_MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.STAGING_MYSQL_PASSWORD }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          # ── Auth secrets ──
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.STAGING_JWT_REFRESH_SECRET }}
          # ── Redis ──
          REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}
          # ── Google OAuth ──
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: https://${{ secrets.CLOUDFLARE_STAGING_SUBDOMAIN }}/api/v1/auth/google/callback
          FRONTEND_URL: https://${{ secrets.CLOUDFLARE_STAGING_SUBDOMAIN }}
          # ── Telegram Auth ──
          TELEGRAM_BOT_TOKEN_STAGE: ${{ secrets.TELEGRAM_BOT_TOKEN_STAGE }}
          TELEGRAM_BOT_USERNAME_STAGE: ${{ secrets.TELEGRAM_BOT_USERNAME_STAGE }}
          # ── DKIM ──
          DKIM_PRIVATE_KEY: ${{ secrets.DKIM_PRIVATE_KEY }}
          # ── Non-secret config ──
          NODE_ENV: staging
          API_PORT: '3001'
          CORS_ORIGINS: '*'
          LOG_LEVEL: debug
          SWAGGER_ENABLED: 'true'
          RATE_LIMIT_TTL: '60000'
          RATE_LIMIT_MAX: '60'
          NEXT_PUBLIC_API_URL: /api
          API_INTERNAL_URL: http://api:3001
          # ── Image config ──
          GHCR_REPO: aleksei-michnik/myfinpro
          IMAGE_TAG: staging-${{ needs.build-and-push.outputs.sha_short }}
          # ── Server config ──
          SERVER_NAME: ${{ secrets.CLOUDFLARE_STAGING_SUBDOMAIN }}
          # ── Mail domain (always production domain — SPF/DKIM are configured there) ──
          MAIL_DOMAIN: ${{ secrets.CLOUDFLARE_PRODUCTION_SUBDOMAIN }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          command_timeout: 30m
          envs: MYSQL_ROOT_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,DATABASE_URL,JWT_SECRET,JWT_REFRESH_SECRET,REDIS_URL,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_CALLBACK_URL,FRONTEND_URL,TELEGRAM_BOT_TOKEN_STAGE,TELEGRAM_BOT_USERNAME_STAGE,DKIM_PRIVATE_KEY,NODE_ENV,API_PORT,CORS_ORIGINS,LOG_LEVEL,SWAGGER_ENABLED,RATE_LIMIT_TTL,RATE_LIMIT_MAX,NEXT_PUBLIC_API_URL,API_INTERNAL_URL,GHCR_REPO,IMAGE_TAG,SERVER_NAME,MAIL_DOMAIN
          script: |
            set -euo pipefail
            cd /opt/myfinpro/staging

            echo "── Exporting environment variables ──"
            export MYSQL_ROOT_PASSWORD
            export MYSQL_DATABASE
            export MYSQL_USER
            export MYSQL_PASSWORD
            export DATABASE_URL
            export JWT_SECRET
            export JWT_REFRESH_SECRET
            export REDIS_URL
            export GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_CALLBACK_URL FRONTEND_URL
            export TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN_STAGE"
            export TELEGRAM_BOT_USERNAME="$TELEGRAM_BOT_USERNAME_STAGE"
            export NEXT_PUBLIC_TELEGRAM_BOT_ID="${TELEGRAM_BOT_TOKEN_STAGE%%:*}"
            export NODE_ENV
            export API_PORT
            export CORS_ORIGINS
            export LOG_LEVEL
            export SWAGGER_ENABLED
            export RATE_LIMIT_TTL
            export RATE_LIMIT_MAX
            export NEXT_PUBLIC_API_URL
            export API_INTERNAL_URL
            export GHCR_REPO
            export IMAGE_TAG
            export SERVER_NAME
            export MAIL_DOMAIN
            export DKIM_PRIVATE_KEY

            echo "── Writing DKIM private key ──"
            mkdir -p /opt/myfinpro/staging/infrastructure/haraka/dkim-keys
            echo "$DKIM_PRIVATE_KEY" > /opt/myfinpro/staging/infrastructure/haraka/dkim-keys/private
            chmod 600 /opt/myfinpro/staging/infrastructure/haraka/dkim-keys/private

            echo "── Ensuring Docker networks exist ──"
            docker network create myfinpro-staging-net 2>/dev/null || true
            docker network create myfinpro-production-net 2>/dev/null || true

            echo "── Setting up shared nginx directory ──"
            mkdir -p /opt/myfinpro/shared/nginx/conf.d
            mkdir -p /opt/myfinpro/shared/ssl
            cp infrastructure/nginx/nginx.conf /opt/myfinpro/shared/nginx/nginx.conf
            cp infrastructure/nginx/conf.d/cloudflare-ips.conf /opt/myfinpro/shared/nginx/conf.d/cloudflare-ips.conf
            cp infrastructure/nginx/conf.d/_default.conf /opt/myfinpro/shared/nginx/conf.d/_default.conf
            # Remove old default.conf from shared dir (we use per-env configs now)
            rm -f /opt/myfinpro/shared/nginx/conf.d/default.conf
            cp docker-compose.shared-nginx.yml /opt/myfinpro/shared/docker-compose.shared-nginx.yml

            echo "── Ensuring shared nginx is running ──"
            cd /opt/myfinpro/shared
            # Stop any old per-environment nginx that might hold port 80
            docker stop myfinpro-prod-nginx myfinpro-staging-nginx 2>/dev/null || true
            docker rm myfinpro-prod-nginx myfinpro-staging-nginx 2>/dev/null || true
            # Start shared nginx if not running (don't force-recreate — that
            # breaks DNS resolution for existing app containers). Config
            # changes are picked up via nginx -s reload in deploy.sh.
            docker compose -p myfinpro-shared -f docker-compose.shared-nginx.yml up -d
            cd /opt/myfinpro/staging

            echo "── Ensuring infrastructure is running ──"
            docker compose -p myfinpro-staging-infra -f docker-compose.staging.infra.yml up -d --build

            echo "── Waiting for MySQL to be healthy ──"
            for i in $(seq 1 30); do
              if docker exec myfinpro-staging-mysql mysqladmin ping -h localhost --silent 2>/dev/null; then
                echo "✅ MySQL is healthy (attempt $i)"
                break
              fi
              echo "  MySQL not ready yet (attempt $i/30), waiting 5s..."
              sleep 5
            done
            # Final check
            if ! docker exec myfinpro-staging-mysql mysqladmin ping -h localhost --silent 2>/dev/null; then
              echo "⚠️ MySQL still not healthy after 150s — restarting..."
              docker restart myfinpro-staging-mysql
              sleep 15
            fi

            echo "── Deploying application with blue-green strategy ──"
            chmod +x scripts/deploy.sh scripts/rollback.sh scripts/cleanup-images.sh
            bash scripts/deploy.sh staging "$IMAGE_TAG"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.2
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.STAGING_MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.STAGING_MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.STAGING_MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.STAGING_MYSQL_PASSWORD }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.STAGING_JWT_REFRESH_SECRET }}
          REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: https://${{ secrets.CLOUDFLARE_STAGING_SUBDOMAIN }}/api/v1/auth/google/callback
          FRONTEND_URL: https://${{ secrets.CLOUDFLARE_STAGING_SUBDOMAIN }}
          NODE_ENV: staging
          API_PORT: '3001'
          CORS_ORIGINS: '*'
          LOG_LEVEL: debug
          SWAGGER_ENABLED: 'true'
          RATE_LIMIT_TTL: '60000'
          RATE_LIMIT_MAX: '60'
          NEXT_PUBLIC_API_URL: /api
          API_INTERNAL_URL: http://api:3001
          GHCR_REPO: aleksei-michnik/myfinpro
          IMAGE_TAG: staging-${{ needs.build-and-push.outputs.sha_short }}
          SERVER_NAME: ${{ secrets.CLOUDFLARE_STAGING_SUBDOMAIN }}
          MAIL_DOMAIN: ${{ secrets.CLOUDFLARE_PRODUCTION_SUBDOMAIN }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          command_timeout: 30m
          envs: MYSQL_ROOT_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,DATABASE_URL,JWT_SECRET,JWT_REFRESH_SECRET,REDIS_URL,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_CALLBACK_URL,FRONTEND_URL,NODE_ENV,API_PORT,CORS_ORIGINS,LOG_LEVEL,SWAGGER_ENABLED,RATE_LIMIT_TTL,RATE_LIMIT_MAX,NEXT_PUBLIC_API_URL,API_INTERNAL_URL,GHCR_REPO,IMAGE_TAG,SERVER_NAME,MAIL_DOMAIN
          script: |
            echo "⚠️ Staging deployment failed — initiating rollback..."
            cd /opt/myfinpro/staging

            export MYSQL_ROOT_PASSWORD MYSQL_DATABASE MYSQL_USER MYSQL_PASSWORD
            export DATABASE_URL JWT_SECRET JWT_REFRESH_SECRET REDIS_URL
            export GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_CALLBACK_URL FRONTEND_URL
            export NODE_ENV API_PORT CORS_ORIGINS LOG_LEVEL SWAGGER_ENABLED
            export RATE_LIMIT_TTL RATE_LIMIT_MAX NEXT_PUBLIC_API_URL API_INTERNAL_URL
            export GHCR_REPO IMAGE_TAG SERVER_NAME MAIL_DOMAIN

            if [ -f scripts/rollback.sh ]; then
              chmod +x scripts/rollback.sh
              bash scripts/rollback.sh staging
            fi

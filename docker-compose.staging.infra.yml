# docker-compose.staging.infra.yml
# Long-lived infrastructure services for staging.
# Managed separately from application deploys (blue-green slots).
# Nginx is in docker-compose.shared-nginx.yml (shared across environments).
# Network: myfinpro-staging-net (created externally before first deploy)
# Usage: docker compose -p myfinpro-staging-infra -f docker-compose.staging.infra.yml up -d

services:
  # ───── MySQL Database ─────
  mysql:
    image: mysql:8.4
    container_name: myfinpro-staging-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - myfinpro-staging-mysql:/var/lib/mysql
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - myfinpro-staging-net
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  # ───── Redis ─────
  redis:
    image: redis:8-alpine
    container_name: myfinpro-staging-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - myfinpro-staging-redis:/data
    networks:
      - myfinpro-staging-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ───── Haraka SMTP Server ─────
  haraka:
    build:
      context: ./infrastructure/haraka
      dockerfile: Dockerfile
    container_name: myfinpro-staging-haraka
    restart: unless-stopped
    environment:
      # Derived from SERVER_NAME; HARAKA_MAIL_HOSTNAME derived by entrypoint.sh as mail.${HARAKA_MAIL_DOMAIN}
      HARAKA_MAIL_DOMAIN: ${SERVER_NAME}
    volumes:
      - ./infrastructure/haraka/dkim-keys:/opt/haraka/dkim-keys:ro
      - myfinpro-staging-haraka-queue:/opt/haraka/queue
    networks:
      myfinpro-staging-net:
        aliases:
          - haraka
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const s=require('net').connect(25,'localhost',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  myfinpro-staging-mysql:
    name: myfinpro-staging-mysql
    driver: local
  myfinpro-staging-redis:
    name: myfinpro-staging-redis
    driver: local
  myfinpro-staging-haraka-queue:
    name: myfinpro-staging-haraka-queue
    driver: local

networks:
  myfinpro-staging-net:
    external: true

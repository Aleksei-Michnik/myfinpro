worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Security headers are set by NestJS (helmet) and Next.js for proxied
    # responses. Only set them here for non-proxied nginx responses (e.g.
    # the /health endpoint). Using 'map' avoids duplicating headers that
    # upstream apps already set.
    # Note: These apply at the http level but proxied responses from
    # NestJS/helmet will have their own headers. To avoid duplication,
    # we rely on the upstream apps for security headers on proxied routes.
    # The headers below only affect direct nginx responses.
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request size limit (for file uploads)
    client_max_body_size 15M;

    include /etc/nginx/conf.d/*.conf;
}

# _default.conf — Default server for health checks and catch-all
# This provides a /health endpoint for Docker healthchecks
# and returns 444 (close connection) for unrecognized hostnames.

server {
    listen 80 default_server;
    server_name _;

    # Health check endpoint for Docker / load balancers
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Reject all other requests to unknown hosts
    location / {
        return 444;
    }
}

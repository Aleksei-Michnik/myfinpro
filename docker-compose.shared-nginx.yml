# docker-compose.shared-nginx.yml
# Shared Nginx reverse proxy for both staging and production.
# Connected to both environments' Docker networks so it can route
# to the active blue/green slot of each environment by hostname.
# Usage: docker compose -p myfinpro-shared -f docker-compose.shared-nginx.yml up -d

services:
  # ───── Shared Nginx Reverse Proxy ─────
  nginx:
    image: nginx:1.28-alpine
    container_name: myfinpro-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./ssl:/etc/letsencrypt:ro
    networks:
      - myfinpro-staging-net
      - myfinpro-production-net
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost/health']
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

networks:
  myfinpro-staging-net:
    external: true
  myfinpro-production-net:
    external: true
